<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ALQUIPC</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <h1>ALQUIPC</h1>
    <br><hr><br><br><br>

    <div class="caja">

        <strong><h2>Alquiler de portatiles</h2></strong>
        <input type="number" id="equipos" placeholder="Número de equipos (mínimo 2)">

        <input type="number" id="dias" placeholder="Número de días iniciales">

        <input type="number" id="extra" placeholder="Días adicionales">

        <select id="tipo">
            <option value="ciudad">Dentro de la ciudad</option>
            <option value="fuera">Fuera de la ciudad (+5%)</option>
            <option value="local">Dentro del establecimiento (-5%)</option>
        </select>

        <button onclick="facturar()">Facturar</button>
        

        <p id="resultado"></p>

    </div>

    <footer>
        <strong>Santiago López Salazar | Derechos reservados</strong>
    </footer>

<script src="index.js"></script>
</body>

</html>
